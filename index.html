<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic SVG & Lottie Cursor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.10.2/lottie.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            cursor: none;
            overflow: hidden;
            background: linear-gradient(to bottom, #ffffff, #cccccc);
        }
        #lottie-container {
            position: fixed;
            scale: 160%;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        .cursor-container {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        #svg-cursor {
            width: 300%;
            height: 300%;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
        #lottie-cursor {
            width: 5%;
            height: 5%;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            opacity: 1;
            transition: opacity 1s ease-in-out;
            z-index: 0;
        }
        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="overlay"></div>
    <img src="1.svg" class="cursor-container" id="svg-cursor">
    <div id="lottie-cursor" class="cursor-container"></div>
    <div id="lottie-container"></div>

    <script>
        // нҡЁкіјмқҢ к°қмІҙ мғқм„ұ
        const sound1 = new Audio('sound_1.mp3'); // мІ« лІҲм§ё нҡЁкіјмқҢ нҢҢмқј кІҪлЎң
        const sound2 = new Audio('sound_2.mp3'); // л‘җ лІҲм§ё нҡЁкіјмқҢ нҢҢмқј кІҪлЎң

        const overlay = document.getElementById('overlay');
        const svgCursor = document.getElementById("svg-cursor");
        const lottieCursorContainer = document.getElementById('lottie-cursor');
        let overlayVisible = true;
        let clickBlocked = false;

        document.addEventListener('click', () => {
            if (clickBlocked) return; // нҒҙлҰӯ м°ЁлӢЁ мғҒнғңмқј кІҪмҡ° мқҙлІӨнҠё л¬ҙмӢң

            clickBlocked = true; // нҒҙлҰӯ м°ЁлӢЁ мғҒнғңлЎң м„Өм •

            setTimeout(() => {
                clickBlocked = false; // 1мҙҲ нӣ„ нҒҙлҰӯ м°ЁлӢЁ н•ҙм ң
            }, 1000); // 1мҙҲ нӣ„ нҒҙлҰӯ м°ЁлӢЁ н•ҙм ң

            // overlayмқҳ мғҒнғң ліҖкІҪ
            if (overlayVisible) {
                overlay.classList.add('hidden');
            } else {
                overlay.classList.remove('hidden');
            }
            overlayVisible = !overlayVisible;

            // нҡЁкіјмқҢ мһ¬мғқ
            if (!isFirstPlayDone) {
                sound1.play(); // мІ« лІҲм§ё нҒҙлҰӯ мӢң нҡЁкіјмқҢ мһ¬мғқ
                cursorAnimation.loop = false;
                cursorAnimation.playSegments(firstPlayFrames, true);
                svgCursor.style.opacity = 1;
                isFirstPlayDone = true;
            } else if (!isFinalPlayDone) {
                if (isLooping) {
                    sound2.play(); // л‘җ лІҲм§ё нҒҙлҰӯ мӢң нҡЁкіјмқҢ мһ¬мғқ
                    cursorAnimation.loop = false;
                    cursorAnimation.stop();
                    isLooping = false;
                }
                cursorAnimation.playSegments(finalPlayFrames, true);
                svgCursor.style.opacity = 0;
                isFinalPlayDone = true;
            }
        });

        const animation = lottie.loadAnimation({
            container: document.getElementById('lottie-container'),
            renderer: 'svg',
            loop: false,
            autoplay: false,
            path: '0.json'
        });

        let scrollProgress = 0;
        const speed = 0.05;

        window.addEventListener('wheel', (event) => {
            if (event.deltaY > 0) {
                scrollProgress += speed;
            } else {
                scrollProgress -= speed;
            }
            
            if (scrollProgress < 0) scrollProgress = 1;
            else if (scrollProgress > 1) scrollProgress = 0;
            
            const totalFrames = animation.totalFrames;
            const currentFrame = Math.floor(totalFrames * scrollProgress);
            animation.goToAndStop(currentFrame, true);
            
            event.preventDefault();
        }, { passive: false });

        const cursorAnimation = lottie.loadAnimation({
            container: lottieCursorContainer,
            renderer: 'svg',
            loop: false,
            autoplay: false,
            path: '1.json'
        });

        const firstPlayFrames = [0, 29];
        const loopPlayFrames = [20, 29];
        const finalPlayFrames = [30, 44];

        let isFirstPlayDone = false;
        let isLooping = false;
        let isFinalPlayDone = false;

        document.addEventListener("mousemove", (event) => {
            const { clientX: x, clientY: y } = event;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const distanceX = Math.abs(x - centerX) / centerX;
            const distanceY = Math.abs(y - centerY) / centerY;
            
            const scale = 1 + (distanceX + distanceY) * 5;
            
            svgCursor.style.left = `${x}px`;
            svgCursor.style.top = `${y}px`;
            svgCursor.style.transform = `translate(-50%, -50%) scale(${scale})`;
            
            lottieCursorContainer.style.left = `${x}px`;
            lottieCursorContainer.style.top = `${y}px`;
            lottieCursorContainer.style.transform = `translate(-50%, -50%) scale(${scale})`;
        });

        cursorAnimation.addEventListener('complete', () => {
            if (isFirstPlayDone && !isLooping && !isFinalPlayDone) {
                cursorAnimation.loop = true;
                cursorAnimation.playSegments(loopPlayFrames, true);
                isLooping = true;
            } else if (isFinalPlayDone) {
                cursorAnimation.goToAndStop(finalPlayFrames[1], true);
                isFinalPlayDone = false;
                isFirstPlayDone = false;
            }
        });
    </script>
</body>
</html>
